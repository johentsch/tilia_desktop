name: Checks

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'docs/**'
      - 'paper/**'
      - '**.md'

  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - 'docs/**'
      - 'paper/**'
      - '**.md'

jobs:
  build:
    name: run tests (${{ matrix.python-version }}, ${{ matrix.os }})${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
        - os: ubuntu-latest
          path: ~/.cache/pip
        - os: macos-latest
          path: ~/Library/Caches/pip
        - os: windows-latest
          path: ~\AppData\Local\pip\Cache
        - os: ubuntu-latest
          python-version: '3.11'
          suffix: ' [with coverage]'
        exclude:
          - os: windows-latest
            python-version: '3.13' # no pyside support
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup additional Linux dependencies
      if: runner.os == 'Linux'
      run: |
        chmod +x ./scripts/linux-setup.sh
        ./scripts/linux-setup.sh

    - uses: actions/cache@v5
      with:
        path: ${{ matrix.path }}
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
         ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install -e . --group ci-tests

    - name: List installed packages
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        pip freeze

    - name: Lint with ruff
      run: |
        ruff check
      continue-on-error: true

    - name: Test with pytest
      if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11') }}
      run: |
        pytest -v --reruns=2 --timeout=10

    - name: Test with pytest (coverage)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        coverage run -m pytest -vs --reruns=2 --timeout=10

    - name: Generate Coverage Report
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
          coverage report -m

    - name: Check Program
      shell: bash
      run: |
        export QT_DEBUG_PLUGINS=1
        echo "Starting GUI..."
        tilia & TILIA_PID=$!; sleep 10; kill $TILIA_PID 2>/dev/null || echo "WARNING: GUI exited before 10s"; wait $TILIA_PID 2>/dev/null || true
        echo "Starting CLI..."
        tilia -i=cli & TILIA_PID=$!; sleep 10; kill $TILIA_PID 2>/dev/null || echo "WARNING: CLI exited before 10s"; wait $TILIA_PID 2>/dev/null || true

name: Build TiLiA

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build with Nuitka
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    outputs:
      linux-build: ${{ steps.set-path.outputs.path }}
    strategy:
      matrix:
        os: [
          macos-latest,
          macos-15-intel,
          ubuntu-22.04,
          windows-latest
          ]
    env:
      QT_DEBUG_PLUGINS: 1
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: "pip"

      - name: Setup additional Linux dependencies
        if: runner.os == 'Linux'
        run: |
          chmod +x ./scripts/linux-setup.sh
          ./scripts/linux-setup.sh

      - name: Remove problematic brew libs (see Nuitka/Nuitka#2853)
        if: runner.os == 'macOS' && runner.arch != 'ARM64'
        run: |
          brew remove --force --ignore-dependencies openssl@3
          brew cleanup openssl@3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group build

      - name: Build executable
        id: build-exe
        shell: bash
        run: |
          echo "python scripts/deploy.py ${{github.ref_name}} ${{matrix.os}}" | bash

      - name: Test executable [mac]
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="${{ steps.build-exe.outputs.out-filepath }}/Contents/MacOS/${{ steps.build-exe.outputs.out-filename }}"
          echo "Checking dependencies"
          echo "Starting GUI..."
          "$APP" &
          APP_PID=$!
          sleep 10
          if ! kill -0 $APP_PID 2>/dev/null; then
            echo "::error::Process terminated early! Potential errors in build."
            exit 1
          fi
          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true
          echo "Starting CLI..."
          "$APP" --user-interface=cli & CLI_PID=$!; sleep 10; kill $CLI_PID 2>/dev/null || echo "WARNING: CLI exited before 10s"; wait $CLI_PID 2>/dev/null || true

          cd "$(dirname ${{ steps.build-exe.outputs.out-filepath }})"
          zip -ry9 "${{ steps.build-exe.outputs.out-filename }}.zip" tilia.app || true

      - name: Test executable [Windows]
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Checking dependencies"
          # test build starts up - should see the output of qt_debug_plugins. the command will kill itself in 10s if everything works. something went wrong if time taken for this command is not 10s.
          echo "Starting GUI..."
          start=$(date +%s)
          echo "timeout 10 ${{ steps.build-exe.outputs.out-filepath }}" | bash || true
          if (($(date +%s) - $start < 10)); then
            echo "::error::Process terminated early! Potential errors in build."
            exit 1
          fi
          echo "\n\nStarting CLI..."
          echo "timeout 10 ${{ steps.build-exe.outputs.out-filepath }} --user-interface=cli" | bash || true

      - name: Test executable [Linux]
        id: set-path
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "path=${{ steps.build-exe.outputs.out-filename }}" >> "$GITHUB_OUTPUT"
          echo "Checking dependencies"
          # test build starts up - should see the output of qt_debug_plugins. the command will kill itself in 10s if everything works. something went wrong if time taken for this command is not 10s.
          echo "Starting GUI..."
          start=$(date +%s)
          echo "timeout 10 ${{ steps.build-exe.outputs.out-filepath }}" | bash || true
          if (($(date +%s) - $start < 10)); then
            echo "::error::Process terminated early! Potential errors in build."
            exit 1
          fi
          echo "\n\nStarting CLI..."
          echo "timeout 10 ${{ steps.build-exe.outputs.out-filepath }} --user-interface=cli" | bash || true

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-exe.outputs.out-filename }}
          path: build/*/exe
          retention-days: 1

  deploy:
    name: Create release
    needs: build
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    env:
      QT_DEBUG_PLUGINS: 1
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Download executable
        uses: actions/download-artifact@v8
        with:
          path: build/
          pattern: 'TiLiA-v*'
          merge-multiple: true

      - name: Test Linux still works in a clean environment
        continue-on-error: true
        run: |
          if [ -e build/ubuntu/exe/${{ needs.build.outputs.linux-build }} ];
            then
              chmod ugo+x build/ubuntu/exe/${{ needs.build.outputs.linux-build }}
              echo "Starting GUI..."
              start=$(date +%s)
              echo "timeout 10 build/ubuntu/exe/${{ needs.build.outputs.linux-build }}" | bash || true
              if (($(date +%s) - $start < 10));
                then
                  echo "Linux didn't work... Check libraries with previous step?";
              else
                echo "Linux started in a clean environment!";
              fi;
              echo "Starting CLI..."
              echo "timeout 10 build/ubuntu/exe/${{ needs.build.outputs.linux-build }} --user-interface=cli" | bash || true
          else
            echo "file not found!";
          fi
          ls build -ltraR |egrep -v '\.$|\.\.|\.:|\.\/|total|^d' | sed '/^$/d' || true

      - name: Upload
        uses: "softprops/action-gh-release@v3"
        id: release
        with:
          tag_name: ${{github.ref_name}}
          make_latest: ${{github.event_name == 'push'}}
          generate_release_notes: true
          files: |
            build/*/exe/TiLiA-v*

      - name: Check output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Counting assets released..."
          ASSET_COUNT=$(gh release view ${{ github.ref_name }} --json assets --jq '.assets | length')
          if [ "$ASSET_COUNT" -eq 4 ]; then
            echo "4 assets found!"
          else
            echo "::error::Incorrect number of assets! Got $ASSET_COUNT. Potential errors in build."
            exit 1
          fi
